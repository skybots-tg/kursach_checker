profile_id: hse_journalism_2024_25
document_kind: course_work
document_label: "НИУ ВШЭ, ОП Журналистика — Методические рекомендации КР 2024/25"

input:
  allowed_file_extensions:
    - doc
    - docx

integrity:
  forbid_track_changes: true
  forbid_comments: true
  forbid_password_protection: true
  forbid_linked_media: true

extraction:
  course_year:
    regex_any_of:
      - "(?i)\\b([2-6])\\s*курс\\b"
    search_scopes: ["first_page", "whole_document"]
    if_not_found_severity: warning
  authors_count:
    labels_any_of: ["Автор", "Автор(ы)", "Студент", "Студент(ы)", "Выполнил", "Выполнили"]
    search_scopes: ["first_page", "whole_document"]
    if_not_found_severity: warning

formats:
  - name: academic
    allowed_for_course_years: [2, 3]
    group_work_allowed: true
    group_work_max_authors: 2
    structure:
      required_sections_in_order:
        - id: title_page
          detect:
            kind: first_page_contains_any
            patterns_any_of:
              - "Высшая школа экономики"
              - "Национальный исследовательский университет"
        - id: toc
          titles_any_of: ["Содержание"]
        - id: introduction
          titles_any_of: ["Введение"]
        - id: main_body
          titles_any_of: ["Основная часть"]
          chapter_rules:
            min_chapters: 2
            min_paragraphs_per_chapter: 2
        - id: contribution
          titles_any_of: ["Вклад"]
          required_if_authors_min: 2
        - id: conclusion
          titles_any_of: ["Заключение"]
        - id: bibliography
          titles_any_of:
            - "Список использованных источников и литературы"
            - "Список использованных источников"
            - "Список литературы"
        - id: appendices
          titles_any_of: ["Приложения", "Приложение"]
          required: false
      bibliography:
        min_total_sources: 20
        require_foreign_sources: true
        recent_min_share: 0.5
        recent_window_years_max: 10

  - name: project_creative
    allowed_for_course_years: [3]
    group_work_allowed: true
    group_work_max_authors: 3
    structure:
      required_sections_in_order:
        - id: title_page
          detect:
            kind: first_page_contains_any
            patterns_any_of:
              - "Высшая школа экономики"
              - "Национальный исследовательский университет"
        - id: toc
          titles_any_of: ["Содержание"]
        - id: introduction
          titles_any_of: ["Введение"]
        - id: theoretical_note
          titles_any_of: ["Теоретическая записка"]
        - id: project_note
          titles_any_of: ["Проектная записка"]
        - id: legal_note
          titles_any_of: ["Юридическая записка"]
          required: false
        - id: creative_part
          titles_any_of: ["Творческая часть"]
        - id: conclusion
          titles_any_of: ["Заключение"]
        - id: bibliography
          titles_any_of:
            - "Список использованных источников и литературы"
            - "Список использованных источников"
            - "Список литературы"
        - id: appendices
          titles_any_of: ["Приложения", "Приложение"]
          required: false

volume:
  unit: author_sheet
  author_sheet_chars_with_spaces: 40000
  include_spaces: true
  include_from_section_any_of: ["Введение"]
  stop_before_section_any_of:
    - "Список использованных источников и литературы"
    - "Список использованных источников"
    - "Список литературы"
    - "Приложения"
    - "Приложение"
  rules:
    - format: academic
      course_year: 2
      authors: 1
      min_author_sheets: 0.5
      if_unknown_course_or_authors_severity: warning
    - format: academic
      course_year: 2
      authors: 2
      min_author_sheets: 1.5
    - format: academic
      course_year: 3
      authors: 1
      min_author_sheets: 1.5
    - format: academic
      course_year: 3
      authors: 2
      min_author_sheets: 2.0
    - format: project_creative
      course_year: 3
      authors: 1
      min_author_sheets: 1.0
    - format: project_creative
      course_year: 3
      authors_in: [2, 3]
      min_author_sheets: 1.5

layout:
  page_size: A4
  orientation: portrait
  margins_mm:
    top: 20
    bottom: 25
    left: 30
    right: 15
  tolerance_mm: 1

typography:
  body:
    font: "Times New Roman"
    size_pt: 14
    line_spacing: 1.5
    alignment: justify
    first_line_indent_mm: 12.5
  footnotes:
    font: "Times New Roman"
    size_pt: 10
    line_spacing: 1.0
    alignment: justify
    first_line_indent_mm: 12.5

objects:
  require_embedded_objects: true


